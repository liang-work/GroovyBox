name: Build GroovyBox

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms (comma-separated): windows, linux, macos, android'
        required: true
        default: 'windows,linux,macos,android'

env:
  FLET_VERSION: '0.85.3'

jobs:
  windows:
    if: contains(inputs.platforms, 'windows')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install pygame mutagen Pillow colorthief httpx
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Add desktop deps
        run: Add-Content -Path requirements.txt -Value "pygame>=2.5.0"
      - name: Build
        timeout-minutes: 60
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/do_build.py windows
      - name: Install NSIS
        continue-on-error: true
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"
      - name: Build NSIS installer
        continue-on-error: true
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsis) {
            & $nsis scripts\package_windows.nsi
            Write-Output "NSIS installer built successfully"
          } else {
            Write-Warning "NSIS not found at $nsis"
          }
      - name: Package portable zip
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Compress-Archive -Path build\windows\* -DestinationPath dist\GroovyBox-Windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-Windows-Installer
          path: dist\GroovyBox-Setup.exe
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-Windows-Zip
          path: dist\GroovyBox-Windows.zip
          if-no-files-found: warn

  linux:
    if: contains(inputs.platforms, 'linux')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install pygame mutagen Pillow colorthief httpx
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Add desktop deps
        run: echo "pygame>=2.5.0" >> requirements.txt
      - name: Build
        timeout-minutes: 60
        run: python scripts/do_build.py linux
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-Linux
          path: build/linux/**
          if-no-files-found: error

  macos:
    if: contains(inputs.platforms, 'macos')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install pygame mutagen Pillow colorthief httpx
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Add desktop deps
        run: echo "pygame>=2.5.0" >> requirements.txt
      - name: Build
        timeout-minutes: 60
        run: python scripts/do_build.py macos
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-macOS
          path: build/macos/**
          if-no-files-found: error

  android:
    if: contains(inputs.platforms, 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install mutagen Pillow colorthief httpx flet-permission-handler
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        if: env.KEYSTORE_B64 != ''
        run: echo "$KEYSTORE_B64" | base64 -d > keystore.jks
      - name: Build
        timeout-minutes: 60
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: python scripts/do_build.py apk
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-Android
          path: build/apk/*.apk
          if-no-files-found: error
