name: Build GroovyBox

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms (comma-separated): windows, linux, macos, android'
        required: true
        default: 'windows,linux,macos,android'

env:
  FLET_VERSION: '0.85.3'

jobs:
  windows:
    if: contains(inputs.platforms, 'windows')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install pygame mutagen Pillow colorthief httpx
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Add desktop deps
        run: Add-Content -Path requirements.txt -Value "pygame>=2.5.0"
      - name: Build
        timeout-minutes: 60
        env:
          PYTHONIOENCODING: utf-8
        run: flet build windows --yes --no-rich-output --skip-flutter-doctor
      - name: List dist
        run: Get-ChildItem dist -ErrorAction SilentlyContinue | Select-Object Name
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-Windows
          path: dist/*
          if-no-files-found: error

  linux:
    if: contains(inputs.platforms, 'linux')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install pygame mutagen Pillow colorthief httpx
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Add desktop deps
        run: echo "pygame>=2.5.0" >> requirements.txt
      - name: Build
        timeout-minutes: 60
        run: flet build linux --yes --no-rich-output --skip-flutter-doctor
      - name: List dist
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-Linux
          path: dist/*
          if-no-files-found: error

  macos:
    if: contains(inputs.platforms, 'macos')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install pygame mutagen Pillow colorthief httpx
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Add desktop deps
        run: echo "pygame>=2.5.0" >> requirements.txt
      - name: Build
        timeout-minutes: 60
        run: flet build macos --yes --no-rich-output --skip-flutter-doctor
      - name: List dist
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-macOS
          path: dist/*
          if-no-files-found: error

  android:
    if: contains(inputs.platforms, 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: |
          pip install flet==${{ env.FLET_VERSION }} flet-audio==${{ env.FLET_VERSION }}
          pip install mutagen Pillow colorthief httpx
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.flet/flutter
          key: flutter-${{ env.FLET_VERSION }}
      - name: Build
        timeout-minutes: 60
        run: flet build apk --yes --no-rich-output --skip-flutter-doctor
      - name: List dist
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: GroovyBox-Android
          path: dist/*
          if-no-files-found: error
